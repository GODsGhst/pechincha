# Blueprint do Render (deploy grátis do backend).
# No Render: New > Blueprint > conecte este repo. Ele lê este arquivo.
# O MONGODB_URI do MongoDB Atlas fica configurado manualmente no painel
# do Render para evitar sincronizar segredo pelo Blueprint.
services:
  - type: web
    name: consult-price-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # o Render gera um segredo aleatório
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: CORS_ORIGIN
        value: https://pechincha-web.onrender.com,http://localhost:5173,http://127.0.0.1:5173
  - type: web
    name: pechincha-web
    runtime: static
    buildCommand: cd site && npm install && npm run build
    staticPublishPath: site/dist
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: VITE_API_URL
        value: https://consult-price-api.onrender.com/api
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
