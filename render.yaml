# Blueprint do Render (deploy grátis do backend).
# No Render: New > Blueprint > conecte este repo. Ele lê este arquivo.
# O MONGODB_URI do MongoDB Atlas fica configurado manualmente no painel
# do Render para evitar sincronizar segredo pelo Blueprint.
services:
  - type: web
    name: consult-price-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Aumente para 2+ em plano com memoria suficiente para ativar workers em paralelo.
      - key: WEB_CONCURRENCY
        value: "1"
      - key: JWT_SECRET
        generateValue: true # o Render gera um segredo aleatório
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: CORS_ORIGIN
        value: https://pechincha-web.onrender.com
      - key: PASSWORD_RESET_BASE_URL
        value: https://pechincha-web.onrender.com
      - key: PASSWORD_RESET_EXPOSE_TOKEN
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
  - type: web
    name: pechincha-web
    runtime: static
    buildCommand: cd site && npm install && npm run build
    staticPublishPath: site/dist
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: VITE_API_URL
        value: https://consult-price-api.onrender.com/api
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
