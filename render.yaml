# Blueprint do Render (deploy grátis do backend).
# No Render: New > Blueprint > conecte este repo. Ele lê este arquivo.
# Depois, em Environment, cole o MONGODB_URI do MongoDB Atlas.
services:
  - type: web
    name: consult-price-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: MONGODB_URI
        sync: false # cole a connection string do Atlas no painel do Render
      - key: JWT_SECRET
        generateValue: true # o Render gera um segredo aleatório
      - key: JWT_EXPIRES_IN
        value: "7d"
